<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>scan – wrhouse</title>

  <!-- ZXing библиотека для сканирования -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <!-- Подключение стилей -->
  <link rel="stylesheet" href="style.css">

  <!-- Подключение скрипта -->
  <script defer src="script.js"></script>
</head>

<body>

  <!-- ====== Контейнер приложения ====== -->
  <div class="container">

    <!-- ====== Заголовок ====== -->
    <div class="header">wrhouse</div>

    <!-- ====== Карточка со сканером ====== -->
    <div class="card">

      <!-- Видео с камерой -->
      <div class="video-wrapper" id="videoWrapper">
        <video id="video"></video>
      </div>

      <!-- Кнопка управления сканированием -->
      <div class="controls">
        <button id="scanBtn">scan</button>
      </div>

      <!-- Статус сканирования -->
      <div id="status" class="status">готов</div>

    </div>

  </div>

</body>
</html>
