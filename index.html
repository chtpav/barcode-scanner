<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wrhouse</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#f2f4f7;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:520px;
padding:20px;
}

.header{
font-size:26px;
font-weight:600;
margin-bottom:15px;
}

.card{
background:white;
border-radius:22px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

video{
width:100%;
border-radius:16px;
background:black;
}

.controls{
margin-top:15px;
display:flex;
gap:10px;
}

button{
flex:1;
border:none;
border-radius:14px;
padding:16px;
font-size:18px;
font-weight:600;
background:#2563eb;
color:white;
}

button:active{
transform:scale(0.97);
}

.status{
margin-top:12px;
font-size:15px;
color:#6b7280;
min-height:20px;
}

.success{
color:#16a34a;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="header">wrhouse</div>

<div class="card">

<video id="video"></video>

<div class="controls">
<button onclick="start()">Scan</button>
</div>

<div id="status" class="status"></div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbytq1RDOgxrzSh8H8RxAkngz673P1gS7qAJi3SZR2CZxZ0TZm8xC6Ou9v-w1oXFJYf_EQ/exec";

let codeReader;
let last="";
let count=0;
let scanning=false;
let sending=false;

function setStatus(text,cls=""){
const el=document.getElementById("status");
el.className="status "+cls;
el.innerText=text;
}

function start(){

if(scanning || sending) return;

scanning=true;
last="";
count=0;

setStatus("scan");

codeReader=new ZXing.BrowserMultiFormatReader();

codeReader.decodeFromVideoDevice(null,"video",(result,err)=>{

if(!scanning) return;

if(result){

const code=result.text;

if(code===last){
count++;
}else{
last=code;
count=1;
}

if(count>=2){

scanning=false;
sending=true;

codeReader.reset();

setStatus("sending");

fetch(API_URL + "?barcode=" + encodeURIComponent(code))
.then(r=>r.json())
.then(data=>{
setStatus(data.result,"success");
})
.catch(()=>{
setStatus("error");
})
.finally(()=>{
sending=false;
});

}

}

});

}

</script>

</body>

</html>
